# The canonical deployment of this app is https://hn.blode.co (hosted on
# Vercel, which ignores this file). This legacy Netlify project ("mblode-hn")
# still serves the old hn.matthewblode.com domain from this repo. Instead of
# building and serving the app a second time, publish a redirect-only directory
# whose _redirects maps the old URL scheme onto the canonical domain.
[build]
  command = "echo 'Redirect-only deploy; rules live in netlify-site/_redirects'"
  publish = "netlify-site"
