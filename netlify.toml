# This app's canonical deployment is https://hn.blode.co (hosted on Vercel,
# which ignores this file). The legacy Netlify project "mblode-hn" serves the
# old hn.matthewblode.com domain and is wired to this repo, so the rule below
# permanently redirects that domain to the canonical one instead of running a
# second copy of the app. Only Netlify reads netlify.toml.
[[redirects]]
  from = "/*"
  to = "https://hn.blode.co/:splat"
  status = 301
  force = true
